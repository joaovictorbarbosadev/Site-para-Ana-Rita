<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Área Secreta 💖</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #000, #1a1a1a);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    .box {
      background: rgba(255,255,255,0.05);
      padding: 30px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      text-align: center;
      box-shadow: 0 0 30px rgba(0,255,150,0.2);
    }

    input {
      padding: 10px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      width: 220px;
    }

    .exemplo {
      font-size: 0.8rem;
      opacity: 0.6;
      margin-bottom: 10px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin: 10px;
      font-weight: bold;
    }

    #sim {
      background: #00ff88;
      color: #000;
    }

    #nao {
      background: #ff4d4d;
      color: #fff;
      position: absolute;
    }

    #painel {
      display: none;
      text-align: center;
    }

    #resposta {
      margin-top: 20px;
      font-size: 1.2rem;
      color: #00ff88;
    }

    .credito {
      position: fixed;
      bottom: 10px;
      right: 15px;
      font-size: 0.8rem;
      opacity: 0.5;
    }
  </style>
</head>

<body>

<div class="box" id="login">
  <h2>Login secreto 🔒</h2>
  <div class="exemplo">Ex: João Victor | 2010-01-19</div>
  <input type="text" id="nome" placeholder="Nome completo"><br>
  <input type="date" id="data"><br>
  <button onclick="entrar()">Entrar</button>
</div>

<div id="painel">
  <h2>Você quer me mandar uma foto desse seu corpão? 😏</h2>
  <button id="sim" onclick="aceitou()">Sim</button>
  <button id="nao">Não</button>
  <p id="resposta"></p>
</div>

<audio id="musica" src="ai-amor.mp3"></audio>

<div class="credito">Crédito: João Victor</div>

<script>
const nomeCorreto = "ana rita";
const dataCorreta = "2010-09-15";

function entrar() {
  let nome = document.getElementById("nome").value.trim().toLowerCase();
  let data = document.getElementById("data").value;

  if (nome === nomeCorreto && data === dataCorreta) {
    document.getElementById("login").style.display = "none";
    document.getElementById("painel").style.display = "block";
    document.getElementById("musica").play();
  } else {
    alert("Acesso negado, somente para a Ana Rita 😘");
  }
}

function aceitou() {
  document.getElementById("resposta").innerText =
  "Eu sabia que vc queria hahaha, você é perfeita ❤️";
}

const botaoNao = document.getElementById("nao");

botaoNao.addEventListener("mouseover", () => {
  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 50);
  botaoNao.style.left = x + "px";
  botaoNao.style.top = y + "px";
  botaoNao.style.transform = "scale(1.3)";
});

window.onbeforeunload = function() {
  return "Tá fugindo? 🤨";
};
</script>

</body>
</html>
